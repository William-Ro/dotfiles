# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI PR

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.nix"
      - flake.lock
      - .github/workflows/**

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            max-jobs = auto
            cores = 0

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/nix
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Format check
        run: |
          nix shell nixpkgs#nixfmt --command \
            find . -name "*.nix" -not -path "./.git/*" -not -name "result" \
            -exec nixfmt --check {} +

      - name: Flake check
        run: nix flake check --no-build

      - name: Deadnix
        continue-on-error: true
        run: nix shell nixpkgs#deadnix --command deadnix --exclude result

      - name: Statix
        continue-on-error: true
        run: nix shell nixpkgs#statix --command statix check

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [syntax]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.syntax.result }}" != "success" ]; then
            echo "Syntax validation failed"
            exit 1
          fi

      - name: Post PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        if: always() && github.event_name == 'pull_request'
        env:
          SYNTAX_RESULT: ${{ needs.syntax.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const syntaxOk = process.env.SYNTAX_RESULT === 'success';

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const check = (ok, pass, fail) => ok ? `**Pass** - ${pass}` : `**Fail** - ${fail}`;

            const body = [
              '## Nix CI Report',
              '',
              '### Pipeline Status',
              `- **Syntax & Lint:** ${check(syntaxOk, 'Format, flake check, deadnix and statix passed.', 'Check nixfmt, flake check, or static analysis output.')}`,
              '',
              '### Conclusion',
              `**Ready to Merge:** ${syntaxOk ? 'Yes. All required checks passed.' : 'No. Fix the failing jobs before merging.'}`,
              '',
              `[View full workflow run details](${runUrl})`
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            }).catch(err => console.log('Comment failed:', err.message));

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI Main

on:
  push:
    branches: [main]
    paths:
      - "**/*.nix"
      - flake.lock

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Configs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee # v31
        with:
          extra_nix_config: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            max-jobs = auto
            cores = 0

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/nix
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Build desktop
        run: nix build .#nixosConfigurations.desktop.config.system.build.toplevel --dry-run

      - name: Build laptop
        run: nix build .#nixosConfigurations.laptop.config.system.build.toplevel --dry-run

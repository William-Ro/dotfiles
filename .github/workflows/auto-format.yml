---
name: Auto Format

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: auto-format
  cancel-in-progress: false

jobs:
  format:
    name: Format Nix Files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run nixfmt
        run: |
          nix shell nixpkgs#nixfmt --command \
            find . -name "*.nix" -not -path "./.git/*" -not -name "result" \
            -exec nixfmt {} +

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: format nix files"
          title: "style: format nix files"
          body: Automated Nix formatting via `nixfmt-rfc-style`.
          branch: style/auto-format
          delete-branch: true
          labels: formatting, automated
